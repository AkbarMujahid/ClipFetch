<!DOCTYPE html>
<html>
<head>
  <title>ClipFetch</title>
  <meta name="viewport" content="width=device-width">

  <link rel="icon" type="image/png" href="../logo.png">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI'; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;

      overflow-y: auto;
      overflow-x: hidden;

      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e3c72);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      transition: 0.3s;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body.light {
      background: #f5f5f5;
      color: #111;
      animation: none;
    }

    .app {
      width: 100%;
      max-width: 520px;
      padding: 25px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    body.light .card {
      background: white;
      color: black;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 600;
    }

    .logo {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,198,255,0.6);
      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 30px rgba(255,0,204,0.8);
    }

    .brand-text {
      background: linear-gradient(90deg,#00c6ff,#ff00cc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .toggle {
      cursor: pointer;
      font-size: 20px;
      transition: 0.3s;
    }

    .toggle:hover {
      transform: rotate(20deg) scale(1.2);
    }

    .input-group {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px;
      margin-top: 15px;
      transition: 0.3s;
    }

    .input-group:focus-within {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 10px rgba(30,136,229,0.5);
    }

    body.light .input-group {
      background: #eee;
    }

    #platformIcon {
      margin-right: 10px;
      font-size: 18px;
      transition: 0.3s;
    }

    input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      color: inherit;
      font-size: 16px;
    }

    .btn {
      margin-top: 14px;
      padding: 14px;
      width: 100%;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg,#1e88e5,#42a5f5);
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(30,136,229,0.5);
    }

    .formats {
      margin-top: 18px;
      scroll-margin-top: 20px;
    }

    .format-btn {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      margin: 6px 0;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
    }

    .format-btn:hover {
      transform: translateY(-3px) scale(1.02);
      background: rgba(255,255,255,0.2);
    }

    #thumbnail {
      width: 100%;
      margin-top: 12px;
      border-radius: 14px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #ccc;
    }

    .spinner {
      display: none;
      margin: 18px auto;
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #1e88e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* 🔥 HISTORY */
    .history {
      margin-top: 20px;
    }

    .history-item {
      padding: 8px;
      margin-bottom: 5px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      cursor: pointer;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.2);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="app">
  <div class="card">

    <div class="top-bar">
      <div class="app-title">
        <img src="../logo.png" class="logo">
        <span class="brand-text">ClipFetch</span>
      </div>

      <div class="toggle" onclick="toggleTheme()">
        <i id="themeIcon" class="fa-solid fa-sun"></i>
      </div>
    </div>

    <div class="input-group">
      <i id="platformIcon" class="fa-solid fa-link"></i>
      <input id="url" placeholder="Paste video link">
    </div>

    <button class="btn" onclick="getFormats()">Get Formats</button>

    <div id="loader" class="spinner"></div>

    <h3 id="title"></h3>
    <img id="thumbnail">

    <div id="formats" class="formats"></div>
    <div id="status"></div>

    <!-- 🔥 HISTORY UI -->
    <div class="history">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h4>Recent Downloads</h4>
    <span onclick="clearHistory()" style="cursor:pointer; font-size:12px; color:#ff6b6b;">
      Clear
    </span>
  </div>

  <div id="historyList"></div>
</div>

  </div>
</div>

<script>
const API = "";
const themeIcon = document.getElementById("themeIcon");

// LOAD HISTORY
function loadHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  const history = JSON.parse(localStorage.getItem("history")) || [];

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";

    const left = document.createElement("div");
    left.style.display = "flex";
    left.style.alignItems = "center";
    left.style.gap = "10px";

    const img = document.createElement("img");
    img.src = item.thumbnail || "";
    img.style.width = "50px";
    img.style.height = "35px";
    img.style.objectFit = "cover";
    img.style.borderRadius = "6px";

    const text = document.createElement("div");
    text.className = "history-text";
    text.innerText = (item.title || "Video") + " • " + item.quality;

    left.appendChild(img);
    left.appendChild(text);

    const btn = document.createElement("button");
    btn.className = "redownload-btn";
    btn.innerText = "Download";

    btn.onclick = () => {
      window.open(`${API}/download?url=${encodeURIComponent(item.url)}&quality=${item.quality}`, "_blank");
    };

    div.appendChild(left);
    div.appendChild(btn);

    list.appendChild(div);
  });
}

// SAVE HISTORY
function saveHistory(url, quality, title, thumbnail) {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.unshift({ url, quality, title, thumbnail });

  if (history.length > 10) history.pop();

  localStorage.setItem("history", JSON.stringify(history));
}

// CLEAR HISTORY
function clearHistory() {
  localStorage.removeItem("history");
  loadHistory();
}

// THEME (unchanged)
window.onload = () => {
  loadHistory();
  const saved = localStorage.getItem("theme") || "dark";
  if (saved === "light") {
    document.body.classList.add("light");
    themeIcon.className = "fa-solid fa-moon";
  }
};

function toggleTheme() {
  const isLight = document.body.classList.contains("light");

  if (isLight) {
    document.body.classList.remove("light");
    localStorage.setItem("theme", "dark");
    themeIcon.className = "fa-solid fa-sun";
  } else {
    document.body.classList.add("light");
    localStorage.setItem("theme", "light");
    themeIcon.className = "fa-solid fa-moon";
  }
}

// PLATFORM ICON (unchanged)
document.getElementById("url").addEventListener("input", function () {
  const url = this.value.toLowerCase();
  const icon = document.getElementById("platformIcon");

  if (url.includes("youtube") || url.includes("youtu.be")) {
    icon.className = "fa-brands fa-youtube";
    icon.style.color = "#FF0000";
  }
  else if (url.includes("instagram")) {
    icon.className = "fa-brands fa-instagram";
    icon.style.color = "#E1306C";
  }
  else if (url.includes("facebook") || url.includes("fb.watch")) {
    icon.className = "fa-brands fa-facebook";
    icon.style.color = "#1877F2";
  }
  else {
    icon.className = "fa-solid fa-link";
    icon.style.color = "#ccc";
  }
});

// GET FORMATS (only added saveHistory)
async function getFormats() {
  const url = document.getElementById("url").value;
  if (!url) return alert("Paste link");

  document.getElementById("loader").style.display = "block";

  const res = await fetch(API + "/formats", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({url})
  });

  const data = await res.json();

  document.getElementById("loader").style.display = "none";
  document.getElementById("title").innerText = data.title;

  if (data.thumbnail) {
    const img = document.getElementById("thumbnail");
    img.src = data.thumbnail;
    img.style.display = "block";
  }

  const container = document.getElementById("formats");
  container.innerHTML = "";

  data.formats.forEach(f => {
    const div = document.createElement("div");
    div.className = "format-btn";
    div.innerText = "Download " + f.quality;

    div.onclick = () => {
      saveHistory(url, f.quality, data.title, data.thumbnail);
      loadHistory();

      window.open(`${API}/download?url=${encodeURIComponent(url)}&quality=${f.quality}`, "_blank");
    };

    container.appendChild(div);
  });

  setTimeout(() => {
    container.scrollIntoView({ behavior: "smooth", block: "start" });
  }, 200);
}

</script>

</body>
</html>
